spring:
  application:
    name: allconverterhub-api
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/allconverterhub}
mongock:
  migration-scan-package: com.allconverterhub.api.migration
app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  mail-from: ${MAIL_FROM:no-reply@allconverterhub.local}
  resend-api-key: ${RESEND_API_KEY:${MAIL_PASSWORD:}}
  jwt:
    # Development-only fallback. Set JWT_SECRET to a random base64 value of at least 32 bytes in every deployment.
    secret: ${JWT_SECRET:YWxsY29udmVydGVyaHViLWxvY2FsLWRldmVsb3BtZW50LXNlY3JldC0zMmJ5dGVz}
    access-token-minutes: ${JWT_ACCESS_TOKEN_MINUTES:15}
    refresh-token-days: ${JWT_REFRESH_TOKEN_DAYS:30}
server:
  port: ${PORT:8080}
  servlet:
    context-path: /api/v1
springdoc:
  swagger-ui:
    path: /docs
